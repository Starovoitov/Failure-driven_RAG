name: rag-fd

services:
  rag-fd:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-fd:slim
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      FRONTEND_HOST: 0.0.0.0
      FRONTEND_PORT: 5173
      EXTERNAL_PORT: ${EXTERNAL_PORT:-5173}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
    ports:
      - "${EXTERNAL_PORT:-5173}:5173"
      - "${BACKEND_EXTERNAL_PORT:-8000}:8000"
    volumes:
      - .:/app
      - /app/FE/node_modules
    stdin_open: true
    tty: true
